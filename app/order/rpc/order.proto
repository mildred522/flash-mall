syntax = "proto3";
package order;
// CHG 2026-01-31: 变更=指定 go_package 为模块路径并固定包名; 之前=相对路径导致找不到包; 原因=生成稳定 import 路径。
option go_package = "flash-mall/app/order/rpc/order;order";

message PreDeductReq {
  int64 product_id = 1;
  int64 amount = 2;
  string order_id = 3;
}

message CreateOrderReq {
  string order_id = 1;
  int64 user_id = 2;
  int64 product_id = 3;
  int64 amount = 4;
  // 幂等请求id
  string request_id = 5;
  int64 expected_price_fen = 6;
}

message CreateOrderResp {
  string order_id = 1;
  string status = 2;
  int64 payable_amount_fen = 3;
  string payment_order_id = 4;
}

message MarkOrderPaidReq {
  string order_id = 1;
  string payment_order_id = 2;
  string out_trade_no = 3;
  string callback_body = 4;
}

message MarkOrderPaidResp {
  bool updated = 1;
  string order_status = 2;
}

message GetOrderDetailReq {
  string order_id = 1;
}

message GetOrderDetailResp {
  string order_id = 1;
  int64 user_id = 2;
  string order_status = 3;
  int64 payable_amount_fen = 4;
  string payment_status = 5;
  int64 origin_price_fen = 6;
  int64 discount_amount_fen = 7;
}

message LifecycleOrderReq {
  string order_id = 1;
  int64 operator_id = 2;
  string operator_role = 3;
  string reason = 4;
  string request_id = 5;
}

message LifecycleOrderResp {
  string order_id = 1;
  int64 status = 2;
  string status_text = 3;
}

message Empty {}

service Order {
  // Redis 预扣库存（正向）
  rpc PreDeduct(PreDeductReq) returns (Empty);
  // Redis 预扣回滚（补偿）
  rpc PreDeductRollback(PreDeductReq) returns (Empty);
  // 创建订单（正向）
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderResp);
  // 订单回滚/关闭（补偿）
  rpc CreateOrderRollback(CreateOrderReq) returns (Empty);
  rpc MarkOrderPaid(MarkOrderPaidReq) returns (MarkOrderPaidResp);
  rpc GetOrderDetail(GetOrderDetailReq) returns (GetOrderDetailResp);
  rpc RequestRefund(LifecycleOrderReq) returns (LifecycleOrderResp);
  rpc ApproveRefund(LifecycleOrderReq) returns (LifecycleOrderResp);
}

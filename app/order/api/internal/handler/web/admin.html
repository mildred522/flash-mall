<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flash Mall - 后台管理</title>
    <style>:root {
  /* E-commerce color palette */
  --bg: #f5f5f5;
  --paper: #ffffff;
  --line: #e8e8e8;
  --ink: #222222;
  --muted: #999999;
  --text-secondary: #666666;

  /* Promotion colors (Chinese e-commerce standard) */
  --brand: #e4393c;
  --brand-hover: #c1272d;
  --brand-light: #fff0f0;
  --brand2: #ff6b35;
  --brand-gradient: linear-gradient(135deg, #e4393c, #ff6b35);

  /* Status */
  --ok: #52c41a;
  --bad: #ff4d4f;
  --warn: #faad14;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
  --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
  --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.15);

  /* Radius */
  --radius-lg: 12px;
  --radius-sm: 6px;
  --radius-full: 999px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--ink);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

a {
  text-decoration: none;
  color: inherit;
}

button, input {
  font: inherit;
}

h1, h2, h3, h4 {
  margin: 0;
  font-weight: 600;
}

@import "./variables.css";

.container {
  width: min(1200px, calc(100% - 32px));
  margin: 0 auto;
}

/* ─── Header ─── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: #fff;
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  gap: 20px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
}
.brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: var(--primary);
  color: #fff;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 800;
}

/* ─── Tab nav ─── */
.admin-nav {
  display: flex;
  gap: 4px;
}
.admin-tab {
  appearance: none;
  border: none;
  background: transparent;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}
.admin-tab:hover {
  background: #f1f5f9;
  color: #334155;
}
.admin-tab.active {
  background: var(--primary);
  color: #fff;
}

/* ─── Panels ─── */
.admin-main {
  padding: 24px 0;
}
.admin-panel {
  display: none;
}
.admin-panel.active {
  display: block;
}
.admin-panel h2 {
  font-size: 20px;
  margin-bottom: 16px;
}

/* ─── Stats grid ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.stat-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 20px;
  text-align: center;
}
.stat-val {
  font-size: 28px;
  font-weight: 700;
  color: #0f172a;
}
.stat-label {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
}
.stat-card.revenue .stat-val { color: #16a34a; }
.stat-card.pending .stat-val { color: #ea580c; }
.stat-card.paid .stat-val { color: #2563eb; }
.stat-card.shipped .stat-val { color: #7c3aed; }
.stat-card.completed .stat-val { color: #16a34a; }

/* ─── Table ─── */
.admin-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--line);
}
.admin-table th,
.admin-table td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid #f1f5f9;
  font-size: 13px;
}
.admin-table th {
  background: #f8fafc;
  color: var(--muted);
  font-weight: 600;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.admin-table tr:hover {
  background: #f8fafc;
}

/* ─── Badge ─── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge.pending { background: #fff7ed; color: #ea580c; }
.badge.paid { background: #eff6ff; color: #2563eb; }
.badge.closed { background: #f1f5f9; color: #64748b; }
.badge.shipped { background: #f5f3ff; color: #7c3aed; }
.badge.completed { background: #f0fdf4; color: #16a34a; }
.badge.refund { background: #fef2f2; color: #dc2626; }
.badge.refunded { background: #fef2f2; color: #991b1b; }
.badge.refund-failed { background: #fff7ed; color: #c2410c; }

/* ─── Filters ─── */
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.filters {
  display: flex;
  align-items: center;
  gap: 8px;
}
.filters select {
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: #fff;
}
.total-label {
  font-size: 13px;
  color: var(--muted);
}

/* ─── Buttons ─── */
.button {
  appearance: none;
  border: none;
  padding: 8px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.button.primary {
  background: var(--primary);
  color: #fff;
}
.button.primary:hover { filter: brightness(1.1); }

.pill {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
}
.pill.outline {
  border: 1px solid var(--line);
  color: var(--muted);
}

/* ─── State helpers ─── */
.loading, .empty, .error {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 14px;
}
.error { color: #dc2626; }

/* ─── Login hint ─── */
.login-hint {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 60vh;
}
.login-card {
  text-align: center;
  background: #fff;
  padding: 48px;
  border-radius: var(--radius-lg);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-md);
}
.login-card h2 { margin-bottom: 12px; }
.login-card p { color: var(--muted); margin-bottom: 24px; }

/* ─── Console ─── */
.console-box {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1e293b;
  color: #94a3b8;
  font-family: "Cascadia Code", "Fira Code", monospace;
  font-size: 12px;
  z-index: 50;
  border-top: 2px solid #334155;
}
.console-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 16px;
  cursor: pointer;
  background: #0f172a;
}
.console-log {
  margin: 0;
  padding: 10px 16px;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ─── Row helper ─── */
.row { display: flex; align-items: center; gap: 10px; }

</style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand"><span class="brand-mark">F</span><span>Flash Mall 后台</span></div>
      <nav class="admin-nav">
        <button class="admin-tab active" data-tab="dashboard">仪表盘</button>
        <button class="admin-tab" data-tab="orders">订单管理</button>
        <button class="admin-tab" data-tab="products">商品管理</button>
        <button class="admin-tab" data-tab="users">用户管理</button>
      </nav>
      <div class="row">
        <a href="/shop" class="pill outline" style="text-decoration:none">返回商城</a>
      </div>
    </div>
  </header>

  <main class="container admin-main" id="admin-main">
    <!-- Dashboard -->
    <div id="panel-dashboard" class="admin-panel active">
      <h2>仪表盘</h2>
      <div id="dashboard-content"><div class="loading">加载中...</div></div>
    </div>

    <!-- Orders -->
    <div id="panel-orders" class="admin-panel">
      <div class="panel-header">
        <h2>订单管理</h2>
        <div class="filters">
          <select id="order-status-filter">
            <option value="">全部状态</option>
            <option value="0">待支付</option>
            <option value="1">已支付</option>
            <option value="2">已关闭</option>
            <option value="3">已发货</option>
            <option value="4">已收货</option>
            <option value="5">退款中</option>
            <option value="6">已退款</option>
            <option value="7">退款异常</option>
          </select>
          <button id="order-filter-apply" class="button primary">筛选</button>
          <span id="orders-total" class="total-label"></span>
        </div>
      </div>
      <table class="admin-table">
        <thead><tr><th>订单号</th><th>用户ID</th><th>商品</th><th>数量</th><th>金额</th><th>状态</th><th>创建时间</th></tr></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>

    <!-- Products -->
    <div id="panel-products" class="admin-panel">
      <h2>商品管理</h2>
      <table class="admin-table">
        <thead><tr><th>ID</th><th>名称</th><th>原价</th><th>售价</th><th>库存</th><th>状态</th></tr></thead>
        <tbody id="products-tbody"></tbody>
      </table>
    </div>

    <!-- Users -->
    <div id="panel-users" class="admin-panel">
      <h2>用户管理</h2>
      <table class="admin-table">
        <thead><tr><th>用户ID</th><th>昵称</th><th>手机号</th><th>注册时间</th></tr></thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </main>

  <div id="login-hint" class="login-hint" style="display:none">
    <div class="login-card">
      <h2>请先登录</h2>
      <p>后台管理需要管理员权限，请先在商城登录后再访问。</p>
      <a href="/shop" class="button primary">前往商城登录</a>
    </div>
  </div>

  <div class="console-box" id="console-box">
    <div class="console-header" id="console-toggle">
      <span>开发者控制台</span>
      <span class="console-chevron">▼</span>
    </div>
    <pre class="console-log" id="console-log"></pre>
  </div>

  <script>({
  token: localStorage.getItem("fm_token") || "",
  user: JSON.parse(localStorage.getItem("fm_user") || "null"),
  consoleCollapsed: window.matchMedia("(max-width:960px)").matches
});
const $1 = (id) => document.getElementById(id);
$1("auth-modal");
$1("console-log");
const state = {
  token: localStorage.getItem("fm_token") || "",
  tab: "dashboard"
};
const $ = (id) => document.getElementById(id);
function log(msg) {
  const box = $("console-log");
  if (box) box.textContent = `[${(/* @__PURE__ */ new Date()).toLocaleTimeString()}] ${msg}
${box.textContent}`;
}
async function authed(path, opts = {}) {
  const headers = { "Content-Type": "application/json" };
  if (state.token) headers["Authorization"] = `Bearer ${state.token}`;
  if (opts.jsonBody) {
    opts.body = JSON.stringify(opts.jsonBody);
    delete opts.jsonBody;
  }
  const resp = await fetch(path, { ...opts, headers: { ...headers, ...opts.headers || {} } });
  if (resp.status === 401) {
    const refreshed = await tryRefresh();
    if (refreshed) {
      headers["Authorization"] = `Bearer ${state.token}`;
      return fetch(path, { ...opts, headers: { ...headers, ...opts.headers || {} } }).then((r) => r.json().then((data2) => ({ ok: r.ok, status: r.status, data: data2 })));
    }
  }
  const data = await resp.json().catch(() => ({}));
  return { ok: resp.ok, status: resp.status, data };
}
async function tryRefresh() {
  const resp = await fetch("/api/auth/refresh", { method: "POST" });
  if (!resp.ok) return false;
  const data = await resp.json();
  if (data.access_token) {
    state.token = data.access_token;
    localStorage.setItem("fm_token", state.token);
    return true;
  }
  return false;
}
function formatPriceFen(fen) {
  if (!fen && fen !== 0) return "0.00";
  return (fen / 100).toFixed(2);
}
function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll(".admin-tab").forEach((el) => el.classList.remove("active"));
  document.querySelectorAll(".admin-panel").forEach((el) => el.classList.remove("active"));
  const tabBtn = document.querySelector(`[data-tab="${tab}"]`);
  if (tabBtn) tabBtn.classList.add("active");
  const panel = $(`panel-${tab}`);
  if (panel) panel.classList.add("active");
  if (tab === "dashboard") loadDashboard();
  else if (tab === "orders") loadOrders();
  else if (tab === "products") loadProducts();
  else if (tab === "users") loadUsers();
}
async function loadDashboard() {
  $("dashboard-content").innerHTML = '<div class="loading">加载中...</div>';
  const resp = await authed("/api/admin/dashboard/stats");
  if (!resp.ok) {
    $("dashboard-content").innerHTML = `<div class="error">加载失败: ${resp.status}</div>`;
    return;
  }
  const d = resp.data;
  $("dashboard-content").innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${d.total_orders || 0}</div><div class="stat-label">总订单</div></div>
      <div class="stat-card revenue"><div class="stat-val">¥${formatPriceFen(d.total_revenue_fen)}</div><div class="stat-label">总收入</div></div>
      <div class="stat-card"><div class="stat-val">${d.total_products || 0}</div><div class="stat-label">商品数</div></div>
      <div class="stat-card"><div class="stat-val">${d.total_users || 0}</div><div class="stat-label">用户数</div></div>
      <div class="stat-card pending"><div class="stat-val">${d.pending_orders || 0}</div><div class="stat-label">待支付</div></div>
      <div class="stat-card paid"><div class="stat-val">${d.paid_orders || 0}</div><div class="stat-label">已支付</div></div>
      <div class="stat-card shipped"><div class="stat-val">${d.shipped_orders || 0}</div><div class="stat-label">已发货</div></div>
      <div class="stat-card completed"><div class="stat-val">${d.completed_orders || 0}</div><div class="stat-label">已完成</div></div>
    </div>`;
  log("仪表盘数据已刷新");
}
const STATUS_MAP = {
  0: { text: "待支付", cls: "pending" },
  1: { text: "已支付", cls: "paid" },
  2: { text: "已关闭", cls: "closed" },
  3: { text: "已发货", cls: "shipped" },
  4: { text: "已收货", cls: "completed" },
  5: { text: "退款中", cls: "refund" },
  6: { text: "已退款", cls: "refunded" },
  7: { text: "退款异常", cls: "refund-failed" }
};
let orderFilters = { status: "", page: 1, page_size: 20 };
async function loadOrders() {
  $("orders-tbody").innerHTML = '<tr><td colspan="7" class="loading">加载中...</td></tr>';
  const params = new URLSearchParams();
  if (orderFilters.status) params.set("status", orderFilters.status);
  params.set("page", orderFilters.page);
  params.set("page_size", orderFilters.page_size);
  const resp = await authed(`/api/admin/orders?${params}`);
  if (!resp.ok) {
    $("orders-tbody").innerHTML = `<tr><td colspan="7" class="error">加载失败</td></tr>`;
    return;
  }
  const items = resp.data.items || [];
  const total = resp.data.total || 0;
  $("orders-tbody").innerHTML = items.length === 0 ? '<tr><td colspan="7" class="empty">暂无订单</td></tr>' : items.map((o) => {
    const st = STATUS_MAP[o.status] || { text: "未知", cls: "" };
    return `<tr>
        <td>${o.order_id}</td>
        <td>${o.user_id}</td>
        <td>${o.product_name || "—"}</td>
        <td>${o.amount}</td>
        <td>¥${formatPriceFen(o.payable_amount_fen)}</td>
        <td><span class="badge ${st.cls}">${st.text}</span>${o.status === 5 || o.status === 7 ? ` <button class="button soft" data-approve-refund="${o.order_id}">${o.status === 7 ? "重试退款" : "审批退款"}</button>` : ""}</td>
        <td>${o.create_time || ""}</td>
      </tr>`;
  }).join("");
  $("orders-tbody").querySelectorAll("[data-approve-refund]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const orderId = btn.getAttribute("data-approve-refund");
      btn.disabled = true;
      const resp = await authed("/api/admin/orders/refund", { method: "POST", jsonBody: { order_id: orderId, reason: "admin approved" } });
      log(resp.ok ? `退款审批完成 order=${orderId}` : `退款审批失败 order=${orderId}`);
      await loadOrders();
    });
  });
  $("orders-total").textContent = `共 ${total} 条`;
  log(`订单列表已刷新 items=${items.length} total=${total}`);
}
async function loadProducts() {
  $("products-tbody").innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
  const resp = await authed("/api/admin/products?page=1&page_size=50");
  if (!resp.ok) {
    $("products-tbody").innerHTML = `<tr><td colspan="6" class="error">加载失败</td></tr>`;
    return;
  }
  const items = resp.data.items || [];
  $("products-tbody").innerHTML = items.length === 0 ? '<tr><td colspan="6" class="empty">暂无商品</td></tr>' : items.map((p) => `<tr>
        <td>${p.product_id}</td>
        <td>${p.name}</td>
        <td>¥${formatPriceFen(p.origin_price_fen)}</td>
        <td>¥${formatPriceFen(p.sale_price_fen)}</td>
        <td>${p.stock_available ?? "—"}</td>
        <td>${p.status === 1 ? '<span class="badge paid">上架</span>' : '<span class="badge closed">下架</span>'}</td>
      </tr>`).join("");
  log(`商品列表已刷新 items=${items.length}`);
}
async function loadUsers() {
  $("users-tbody").innerHTML = '<tr><td colspan="4" class="loading">加载中...</td></tr>';
  const resp = await authed("/api/admin/users?page=1&page_size=50");
  if (!resp.ok) {
    $("users-tbody").innerHTML = `<tr><td colspan="4" class="error">加载失败 (可能需要 auth-api 支持)</td></tr>`;
    return;
  }
  const items = resp.data.items || resp.data.users || [];
  $("users-tbody").innerHTML = items.length === 0 ? '<tr><td colspan="4" class="empty">暂无用户数据</td></tr>' : items.map((u) => `<tr>
        <td>${u.user_id || u.id || "—"}</td>
        <td>${u.display_name || u.username || "—"}</td>
        <td>${u.phone || "—"}</td>
        <td>${u.created_at || u.create_time || "—"}</td>
      </tr>`).join("");
  log(`用户列表已刷新 items=${items.length}`);
}
document.querySelectorAll("[data-tab]").forEach(
  (btn) => btn.addEventListener("click", () => switchTab(btn.getAttribute("data-tab")))
);
$("order-filter-apply")?.addEventListener("click", () => {
  orderFilters.status = $("order-status-filter")?.value || "";
  orderFilters.page = 1;
  loadOrders();
});
if (!state.token) {
  $("login-hint").style.display = "";
  $("admin-main").style.display = "none";
} else {
  $("login-hint").style.display = "none";
  $("admin-main").style.display = "";
  switchTab("dashboard");
}
log("后台管理已就绪");
</script>
</body>
</html>

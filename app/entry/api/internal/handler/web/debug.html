<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flash Mall - 调试</title>
    <style>:root {
  /* E-commerce color palette */
  --bg: #f5f5f5;
  --paper: #ffffff;
  --line: #e8e8e8;
  --ink: #222222;
  --muted: #999999;
  --text-secondary: #666666;

  /* Promotion colors (Chinese e-commerce standard) */
  --brand: #e4393c;
  --brand-hover: #c1272d;
  --brand-light: #fff0f0;
  --brand2: #ff6b35;
  --brand-gradient: linear-gradient(135deg, #e4393c, #ff6b35);

  /* Status */
  --ok: #52c41a;
  --bad: #ff4d4f;
  --warn: #faad14;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
  --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
  --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.15);

  /* Radius */
  --radius-lg: 12px;
  --radius-sm: 6px;
  --radius-full: 999px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--ink);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

a {
  text-decoration: none;
  color: inherit;
}

button, input {
  font: inherit;
}

h1, h2, h3, h4 {
  margin: 0;
  font-weight: 600;
}

@import "./variables.css";

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 32px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.top h1 {
  font-size: 20px;
  font-weight: 700;
}

.top p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.top a, .button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.button.primary {
  background: var(--brand);
  border-color: var(--brand);
  color: #fff;
}

.button.primary:hover {
  background: var(--brand-hover);
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.card {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow);
}

.card h2, .card h3 {
  margin: 0 0 12px;
  font-size: 16px;
}

.card p {
  color: var(--muted);
  line-height: 1.7;
  font-size: 13px;
  margin: 0 0 12px;
}

.pill {
  display: inline-flex;
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 12px;
  background: var(--bg);
  border: 1px solid var(--line);
}

.pill.ok {
  background: #f6ffed;
  border-color: #b7eb8f;
  color: var(--ok);
}

.pill.bad {
  background: #fff2f0;
  border-color: #ffccc7;
  color: var(--bad);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th, td {
  text-align: left;
  padding: 8px 4px;
  border-bottom: 1px solid var(--line);
}

th {
  color: var(--muted);
  font-weight: 600;
  font-size: 12px;
}

pre {
  margin: 0;
  background: #1a1a2e;
  color: #e0e0e0;
  border-radius: var(--radius-sm);
  padding: 14px;
  min-height: 160px;
  white-space: pre-wrap;
  font-family: Consolas, Menlo, monospace;
  font-size: 12px;
  line-height: 1.6;
}

@media (max-width: 860px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Flash Mall 调试面板</h1>
        <p>联调入口和健康检查，业务操作请到商城页</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="/">首页</a>
        <a class="button primary" href="/shop">商城</a>
      </div>
    </header>

    <section class="grid">
      <article class="card">
        <h2>健康检查</h2>
        <p><span id="overall" class="pill">未检查</span></p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button id="run-health" class="button primary" type="button">执行检查</button>
          <a class="button" href="/api/system/health" target="_blank" rel="noopener">JSON</a>
        </div>
        <table>
          <thead><tr><th>依赖</th><th>状态</th><th>详情</th></tr></thead>
          <tbody id="health-body"></tbody>
        </table>
      </article>

      <article class="card">
        <h2>联调入口</h2>
        <p>登录、注册、下单等业务操作统一在商城页进行。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="button primary" href="/shop">去商城</a>
          <a class="button" href="/shop#campaign-strip">会场</a>
        </div>
      </article>

      <article class="card">
        <h3>验收顺序</h3>
        <ol style="padding-left:20px;margin:0;font-size:13px;color:var(--text-secondary);line-height:1.8">
          <li>商城页登录（密码或验证码）</li>
          <li>确认控制台显示已登录</li>
          <li>下单、连点下单、退出登录</li>
          <li>返回此页做健康检查</li>
        </ol>
      </article>

      <article class="card">
        <h3>日志</h3>
        <pre id="debug-log">等待操作...</pre>
      </article>
    </section>
  </div>
  <script>const body = document.getElementById("health-body");
const overall = document.getElementById("overall");
const logBox = document.getElementById("debug-log");
function log(message) {
  logBox.textContent = `[${(/* @__PURE__ */ new Date()).toLocaleTimeString()}] ${message}
${logBox.textContent}`;
}
async function runHealth() {
  overall.textContent = "检查中";
  body.innerHTML = "";
  try {
    const response = await fetch("/api/system/health", { credentials: "same-origin" });
    const data = await response.json();
    overall.textContent = data.overall ? "整体正常" : "部分降级";
    overall.className = `pill ${data.overall ? "ok" : "bad"}`;
    (data.dependencies || []).forEach((dep) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${dep.name}</td><td class="${dep.ok ? "ok" : "bad"}">${dep.ok ? "OK" : "FAIL"}</td><td>${dep.detail}</td>`;
      body.appendChild(tr);
    });
    log(`健康检查完成 overall=${data.overall}`);
  } catch (error) {
    overall.textContent = "检查失败";
    overall.className = "pill bad";
    log(`健康检查失败 error=${error.message || "unknown"}`);
  }
}
document.getElementById("run-health").addEventListener("click", runHealth);
</script>
</body>
</html>

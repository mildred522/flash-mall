apiVersion: v1
kind: Secret
metadata:
  name: flash-mall-runtime-secrets
  namespace: flash-mall
type: Opaque
stringData:
  order-datasource: "REPLACE_WITH_ORDER_MYSQL_DSN"
  auth-datasource: "REPLACE_WITH_AUTH_MYSQL_DSN"
  product-datasource: "REPLACE_WITH_PRODUCT_MYSQL_DSN"
  mysql-root-password: "REPLACE_WITH_MYSQL_ROOT_PASSWORD"
  rabbitmq-user: "REPLACE_WITH_RABBITMQ_USER"
  rabbitmq-password: "REPLACE_WITH_RABBITMQ_PASSWORD"
  rabbitmq-url: "amqp://REPLACE_WITH_USER:REPLACE_WITH_PASSWORD@rabbitmq.flash-mall.svc.cluster.local:5672/"
  jwt-auth-secret: "REPLACE_WITH_LONG_RANDOM_JWT_SECRET"
  payment-callback-secret: "REPLACE_WITH_LONG_RANDOM_PAYMENT_CALLBACK_SECRET"
  demo-password: "REPLACE_WITH_DEMO_USER_PASSWORD"

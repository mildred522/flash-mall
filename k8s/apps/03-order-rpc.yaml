apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-rpc
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: order-rpc
    app.kubernetes.io/part-of: flash-mall
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-rpc
  template:
    metadata:
      labels:
        app: order-rpc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      containers:
        - name: order-rpc
          image: flash-mall/order-rpc:dev
          imagePullPolicy: IfNotPresent
          args: ["-f", "/etc/flash-mall/order.yaml"]
          ports:
            - name: grpc
              containerPort: 8090
            - name: metrics
              containerPort: 9091
            - name: pprof
              containerPort: 6061
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: order-rpc-config
              mountPath: /etc/flash-mall
      volumes:
        - name: order-rpc-config
          configMap:
            name: order-rpc-config
      # CHG 2026-02-26: 变更=增加跨节点反亲和; 之前=可能同节点聚集; 原因=提升故障隔离。
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: order-rpc
                topologyKey: kubernetes.io/hostname
      # CHG 2026-02-26: 变更=增加拓扑分布约束; 之前=无节点均衡; 原因=尽量均匀分布副本。
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-rpc
---
apiVersion: v1
kind: Service
metadata:
  name: order-rpc
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: order-rpc
spec:
  selector:
    app: order-rpc
  ports:
    - name: grpc
      port: 8090
      targetPort: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-rpc-hpa
  namespace: flash-mall
# CHG 2026-02-24: 变更=新增 HPA; 之前=固定副本; 原因=压测/高峰期自动扩缩容。
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-rpc
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: auth-api
    app.kubernetes.io/part-of: flash-mall
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: flash-mall/auth-api:dev
          imagePullPolicy: IfNotPresent
          args: ["-f", "/etc/flash-mall/auth-api.yaml"]
          env:
            - name: FLASH_MALL_AUTH_DATASOURCE
              valueFrom:
                secretKeyRef:
                  name: flash-mall-runtime-secrets
                  key: auth-datasource
            - name: FLASH_MALL_JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: flash-mall-runtime-secrets
                  key: jwt-auth-secret
            - name: FLASH_MALL_DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flash-mall-runtime-secrets
                  key: demo-password
          ports:
            - name: http
              containerPort: 8890
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: auth-api-config
              mountPath: /etc/flash-mall
      volumes:
        - name: auth-api-config
          configMap:
            name: auth-api-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth-api
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-api
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: auth-api
spec:
  selector:
    app: auth-api
  ports:
    - name: http
      port: 8890
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-api-hpa
  namespace: flash-mall
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

apiVersion: v1
kind: ConfigMap
metadata:
  name: entry-api-config
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: entry-api
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=新增 entry-api 的 K8s ConfigMap; 之前=配置散落在本地; 原因=容器化统一管理。

data:
  entry-api.yaml: |
    Name: entry-api
    Host: 0.0.0.0
    Port: 8888

    DtmServer: dtm:36790
    ProductRpcTarget: product-rpc:8080
    OrderRpcTarget: order-rpc:8090
    InventoryKitexEndpoint: inventory-kitex:8093
    OrderTimeoutSeconds: 60

    # Required configs (avoid startup failure)
    RequestIdTTLSeconds: 86400
    DtmTimeoutToFailSeconds: 10
    DtmRequestTimeoutSeconds: 10
    # CHG 2026-02-24: 变更=DTM 异步提交; 之前=同步等待结果; 原因=降低接口尾延迟与阻塞。
    DtmWaitResult: false

    # CHG 2026-02-24: 变更=新增 API 限流配置; 之前=无限流; 原因=高峰期快速失败保护后端。
    OrderRateLimitQps: 200
    OrderRateLimitBurst: 400
    OrderIdNode: -1

    # CHG 2026-02-28: 变更=新增 RabbitMQ 消费配置; 之前=仅 Redis 延迟队列; 原因=展示事件驱动增量架构。
    RabbitMQURL: ${FLASH_MALL_RABBITMQ_URL}
    RabbitMQExchange: order.events
    RabbitMQQueue: order.events.created.q
    RabbitMQRouteKey: order.created
    RabbitMQConsumerTag: entry-api-consumer
    RabbitMQPrefetch: 20
    OrderEventConsumerEnabled: true
    EventDedupTTLSeconds: 86400

    ProductRpcConf:
      Etcd:
        Hosts:
          - etcd:2379
        Key: product.rpc

    # CHG 2026-02-24: 变更=新增 Order RPC 客户端配置; 之前=关单仅回滚 DB; 原因=回滚 Redis 预扣库存以保证一致性。
    OrderRpcConf:
      Etcd:
        Hosts:
          - etcd:2379
        Key: order.rpc

    RedisConf:
      Host: redis:6379
      Type: node

    DataSource: ${FLASH_MALL_ORDER_DATASOURCE}
    CacheConf:
      - Host: redis:6379
        Type: node

    PprofAddr: 0.0.0.0:6060
    MetricsAddr: 0.0.0.0:9090
    JwtAuthSecret: ${FLASH_MALL_JWT_AUTH_SECRET}
    JwtExpireSeconds: 7200
    AuthServiceBaseURL: http://auth-api:8890
    PaymentCallbackSecret: ${FLASH_MALL_PAYMENT_CALLBACK_SECRET}
    PaymentCallbackMaxSkewSeconds: 300
    UploadDir: /data/flash-mall/uploads

    Observability:
      Tracing:
        Enabled: false
        ServiceName: entry-api
        Exporter: stdout
        Endpoint: http://jaeger:4318/v1/traces
        SampleRatio: 1.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-api-config
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: auth-api
    app.kubernetes.io/part-of: flash-mall
data:
  auth-api.yaml: |
    Name: auth-api
    Host: 0.0.0.0
    Port: 8890
    Timeout: 2000

    JwtAuthSecret: ${FLASH_MALL_JWT_AUTH_SECRET}
    JwtExpireSeconds: 7200
    DemoPassword: ${FLASH_MALL_DEMO_PASSWORD}
    DataSource: ${FLASH_MALL_AUTH_DATASOURCE}

    RedisConf:
      Host: redis:6379
      Type: node

    RefreshTokenTTLSeconds: 604800
    CodeTTLSeconds: 300
    RefreshCookieName: fm_refresh_token
    LoginFailWindowSeconds: 900
    LoginFailPhoneMaxAttempts: 5
    LoginFailIPMaxAttempts: 20
    CodeSendCooldownSeconds: 60
    CodeSendPhoneWindowSeconds: 600
    CodeSendPhoneMaxAttempts: 3
    CodeSendIPWindowSeconds: 600
    CodeSendIPMaxAttempts: 10
    VerificationCodeMaxAttempts: 5
    SecurityAuditRecentLimit: 10
    SecurityAuditRetentionLimit: 200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-rpc-config
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: order-rpc
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=新增 order-rpc 的 K8s ConfigMap; 之前=配置散落在本地; 原因=容器化统一管理。

data:
  order.yaml: |
    Name: order.rpc
    ListenOn: 0.0.0.0:8090

    DataSource: ${FLASH_MALL_ORDER_DATASOURCE}

    RedisConf:
      Host: redis:6379
      Type: node

    Etcd:
      Hosts:
        - etcd:2379
      Key: order.rpc

    ProductRpcConf:
      Etcd:
        Hosts:
          - etcd:2379
        Key: product.rpc
      Timeout: 2000

    InventoryKitexEndpoint: inventory-kitex:8093

    PprofAddr: 0.0.0.0:6061
    MetricsAddr: 0.0.0.0:9091

    Observability:
      Tracing:
        Enabled: false
        ServiceName: order-rpc
        Exporter: stdout
        Endpoint: http://jaeger:4318/v1/traces
        SampleRatio: 1.0

    # Required configs (avoid startup failure)
    StockShardCount: 4
    RabbitMQURL: ${FLASH_MALL_RABBITMQ_URL}
    RabbitMQExchange: order.events
    RabbitMQRouteKey: order.created
    OutboxBatchSize: 20
    OutboxPollMs: 1000
    OutboxRetrySec: 5
    OutboxTimeoutSec: 60
    OutboxMaxRetries: 8
    OutboxSingleActive: true
    OutboxLeaderLockKey: order:outbox:publisher:leader
    OutboxLeaderLockTTL: 90
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-rpc-config
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: product-rpc
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=新增 product-rpc 的 K8s ConfigMap; 之前=配置散落在本地; 原因=容器化统一管理。

data:
  product.yaml: |
    Name: product.rpc
    ListenOn: 0.0.0.0:8080

    DataSource: ${FLASH_MALL_PRODUCT_DATASOURCE}

    # CHG 2026-02-24: 变更=新增库存分桶数量; 之前=单行库存; 原因=降低热点行冲突。
    StockBucketCount: 4

    Etcd:
      Hosts:
        - etcd:2379
      Key: product.rpc

    PprofAddr: 0.0.0.0:6062
    MetricsAddr: 0.0.0.0:9092

    Observability:
      Tracing:
        Enabled: false
        ServiceName: product-rpc
        Exporter: stdout
        Endpoint: http://jaeger:4318/v1/traces
        SampleRatio: 1.0

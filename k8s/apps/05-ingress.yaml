apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: order-api
  namespace: flash-mall
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: flash-mall.local
      http:
        paths:
          - path: /?(.*)
            pathType: Prefix
            backend:
              service:
                name: order-api
                port:
                  number: 8888

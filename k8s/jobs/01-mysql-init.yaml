apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: mysql-init
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=新增 MySQL 初始化 Job; 之前=手动执行 SQL; 原因=自动化环境初始化。
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: mysql-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flash-mall-runtime-secrets
                  key: mysql-root-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "wait mysql..."
              until mysqladmin ping -h mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent; do
                sleep 2
              done
              echo "init schema..."
              mysql -h mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" < /init/init-db.sql
              echo "done"
          volumeMounts:
            - name: init-sql
              mountPath: /init
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init-sql

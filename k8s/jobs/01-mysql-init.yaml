apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: mysql-init
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=把初始化 SQL 做成 ConfigMap; 之前=手动在 Pod 内执行; 原因=用 Job 自动化初始化。
data:
  init-db.sql: |
    -- 初始化数据库与表结构（K8s MySQL）

    CREATE DATABASE IF NOT EXISTS mall_order DEFAULT CHARSET utf8mb4;
    CREATE DATABASE IF NOT EXISTS mall_product DEFAULT CHARSET utf8mb4;
    CREATE DATABASE IF NOT EXISTS dtm DEFAULT CHARSET utf8mb4;

    USE mall_order;

    CREATE TABLE IF NOT EXISTS orders (
      id varchar(64) NOT NULL COMMENT '订单id',
      request_id varchar(64) DEFAULT NULL COMMENT '幂等请求id',
      user_id bigint NOT NULL DEFAULT 0 COMMENT '用户id',
      product_id bigint NOT NULL DEFAULT 0 COMMENT '商品id',
      amount int NOT NULL DEFAULT 0 COMMENT '数量',
      status tinyint NOT NULL DEFAULT 0 COMMENT '订单状态 0-待支付 1-已支付 2-已关闭',
      create_time timestamp NULL DEFAULT CURRENT_TIMESTAMP,
      update_time timestamp NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uniq_request_id (request_id),
      KEY ix_user_id (user_id),
      KEY ix_create_time (create_time)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    -- DTM barrier 表（订单库）
    CREATE TABLE IF NOT EXISTS barrier (
      id bigint NOT NULL AUTO_INCREMENT,
      trans_type varchar(45) NOT NULL,
      gid varchar(128) NOT NULL,
      branch_id varchar(128) NOT NULL,
      op varchar(45) NOT NULL,
      barrier_id varchar(45) NOT NULL,
      reason varchar(45) DEFAULT '',
      create_time datetime DEFAULT CURRENT_TIMESTAMP,
      update_time datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uniq_barrier (gid, branch_id, op, barrier_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    USE mall_product;

    CREATE TABLE IF NOT EXISTS product (
      id bigint NOT NULL,
      name varchar(128) NOT NULL DEFAULT '',
      stock int NOT NULL DEFAULT 0,
      version bigint NOT NULL DEFAULT 0,
      PRIMARY KEY (id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS stock_log (
      id bigint NOT NULL AUTO_INCREMENT,
      order_id varchar(64) NOT NULL,
      type varchar(32) NOT NULL,
      create_time timestamp NULL DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uniq_order_type (order_id, type)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    -- DTM barrier 表（商品库）
    CREATE TABLE IF NOT EXISTS barrier (
      id bigint NOT NULL AUTO_INCREMENT,
      trans_type varchar(45) NOT NULL,
      gid varchar(128) NOT NULL,
      branch_id varchar(128) NOT NULL,
      op varchar(45) NOT NULL,
      barrier_id varchar(45) NOT NULL,
      reason varchar(45) DEFAULT '',
      create_time datetime DEFAULT CURRENT_TIMESTAMP,
      update_time datetime DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uniq_barrier (gid, branch_id, op, barrier_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    -- 初始化示例商品
    INSERT INTO product (id, name, stock, version)
    VALUES (100, 'demo-product', 10000, 0)
    ON DUPLICATE KEY UPDATE stock = VALUES(stock), version = VALUES(version);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init
  namespace: flash-mall
  labels:
    app.kubernetes.io/name: mysql-init
    app.kubernetes.io/part-of: flash-mall
# CHG 2026-02-24: 变更=新增 MySQL 初始化 Job; 之前=手动执行 SQL; 原因=自动化环境初始化。
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: mysql-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: flashmall
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "wait mysql..."
              until mysqladmin ping -h mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" --silent; do
                sleep 2
              done
              echo "init schema..."
              mysql -h mysql -uroot -p"${MYSQL_ROOT_PASSWORD}" < /init/init-db.sql
              echo "done"
          volumeMounts:
            - name: init-sql
              mountPath: /init
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init-sql

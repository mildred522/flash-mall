apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: flash-mall
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: flash-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: flashmall
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          # CHG 2026-02-24: 变更=kind 下改用 emptyDir; 之前=PVC 绑定失败导致 Pending; 原因=kind 默认无动态存储。
          emptyDir: {}

apiVersion: v1
kind: Service
metadata:
  name: dtm
  namespace: flash-mall
spec:
  selector:
    app: dtm
  ports:
    - name: grpc
      port: 36790
      targetPort: 36790
    - name: http
      port: 36789
      targetPort: 36789
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtm
  namespace: flash-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dtm
  template:
    metadata:
      labels:
        app: dtm
    spec:
      containers:
        - name: dtm
          # CHG 2026-02-24: 变更=使用 yedf/dtm 镜像; 之前=dtm-labs/dtm 不可拉取; 原因=Docker Hub 无该仓库或受限。
          image: yedf/dtm:latest
          # CHG 2026-02-24: 变更=固定为 IfNotPresent; 之前=latest 默认 Always 导致反复拉取失败; 原因=kind 本地镜像应直接使用。
          imagePullPolicy: IfNotPresent
          env:
            - name: DTM_MYSQL_HOST
              value: mysql
            - name: DTM_MYSQL_USER
              value: root
            - name: DTM_MYSQL_PASSWORD
              value: flashmall
            - name: DTM_MYSQL_PORT
              value: "3306"
            - name: DTM_MYSQL_DB
              value: dtm
          ports:
            - containerPort: 36789
            - containerPort: 36790

name: Release Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override for manual release
        required: false
        type: string
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: order-api
            dockerfile: build/docker/order-api.Dockerfile
          - image: order-rpc
            dockerfile: build/docker/order-rpc.Dockerfile
          - image: product-rpc
            dockerfile: build/docker/product-rpc.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/flash-mall-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop-latest,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 6494kj06
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p6494kj06"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            web/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build:shop && npm run build:admin

      - name: Build embedded web
        run: cd web && npm ci && npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Prepare test databases
        run: |
          docker exec "${{ job.services.mysql.id }}" mysql -uroot -p6494kj06 -e "CREATE DATABASE IF NOT EXISTS mall_auth DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          docker exec "${{ job.services.mysql.id }}" mysql -uroot -p6494kj06 -e "CREATE DATABASE IF NOT EXISTS mall_order DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          docker exec "${{ job.services.mysql.id }}" mysql -uroot -p6494kj06 -e "CREATE DATABASE IF NOT EXISTS mall_product DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./app/entry/api/... ./app/order/rpc/... ./app/product/rpc/... ./app/auth/api/... -count=1

      - name: Parse entry API contract
        run: |
          go install github.com/zeromicro/go-zero/tools/goctl@v1.9.2
          goctl api format --stdin < app/entry/api/entry.api > /tmp/entry-api.formatted

      - name: Parse auth API contract
        run: goctl api format --stdin < app/auth/api/auth.api > /tmp/auth-api.formatted

      - name: Build binaries
        run: go build ./app/entry/api ./app/auth/api ./app/order/rpc ./app/product/rpc

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            web/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build:shop && npm run build:admin

      - name: Build embedded web
        run: cd web && npm ci && npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run end-to-end smoke test
        run: bash scripts/ci/smoke-e2e.sh

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - smoke-e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: entry-api
            dockerfile: build/docker/entry-api.Dockerfile
          - image: auth-api
            dockerfile: build/docker/auth-api.Dockerfile
          - image: order-rpc
            dockerfile: build/docker/order-rpc.Dockerfile
          - image: product-rpc
            dockerfile: build/docker/product-rpc.Dockerfile
          - image: inventory-kitex
            dockerfile: build/docker/inventory-kitex.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.image }}:ci
          provenance: false

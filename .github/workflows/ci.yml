name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build:shop && npm run build:admin

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./app/order/api/... ./app/order/rpc/... ./app/product/rpc/... ./app/auth/api/... -count=1

      - name: Parse order API contract
        run: |
          go install github.com/zeromicro/go-zero/tools/goctl@v1.9.2
          goctl api format --stdin < app/order/api/order.api > /tmp/order-api.formatted

      - name: Build binaries
        run: go build ./app/order/api ./app/order/rpc ./app/product/rpc

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: go-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build:shop && npm run build:admin

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run end-to-end smoke test
        run: bash scripts/ci/smoke-e2e.sh

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - smoke-e2e
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: order-api
            dockerfile: build/docker/order-api.Dockerfile
          - image: order-rpc
            dockerfile: build/docker/order-rpc.Dockerfile
          - image: product-rpc
            dockerfile: build/docker/product-rpc.Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: local/${{ matrix.image }}:ci
          provenance: false

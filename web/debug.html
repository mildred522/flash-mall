<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flash Mall - 调试</title>
  <link rel="stylesheet" href="./styles/debug.css" />
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Flash Mall 调试面板</h1>
        <p>联调入口和健康检查，业务操作请到商城页</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="/">首页</a>
        <a class="button primary" href="/shop">商城</a>
      </div>
    </header>

    <section class="grid">
      <article class="card">
        <h2>健康检查</h2>
        <p><span id="overall" class="pill">未检查</span></p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
          <button id="run-health" class="button primary" type="button">执行检查</button>
          <a class="button" href="/api/system/health" target="_blank" rel="noopener">JSON</a>
        </div>
        <table>
          <thead><tr><th>依赖</th><th>状态</th><th>详情</th></tr></thead>
          <tbody id="health-body"></tbody>
        </table>
      </article>

      <article class="card">
        <h2>联调入口</h2>
        <p>登录、注册、下单等业务操作统一在商城页进行。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <a class="button primary" href="/shop">去商城</a>
          <a class="button" href="/shop#campaign-strip">会场</a>
        </div>
      </article>

      <article class="card">
        <h3>验收顺序</h3>
        <ol style="padding-left:20px;margin:0;font-size:13px;color:var(--text-secondary);line-height:1.8">
          <li>商城页登录（密码或验证码）</li>
          <li>确认控制台显示已登录</li>
          <li>下单、连点下单、退出登录</li>
          <li>返回此页做健康检查</li>
        </ol>
      </article>

      <article class="card">
        <h3>日志</h3>
        <pre id="debug-log">等待操作...</pre>
      </article>
    </section>
  </div>
  <script type="module" src="./js/debug.js"></script>
</body>
</html>
